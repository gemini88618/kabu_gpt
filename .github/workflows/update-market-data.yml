name: Update Market Data

on:
  schedule:
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update_market_data.py"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy openpyxl xlrd

      - name: Fetch market data
        run: python scripts/update_market_data.py

      - name: Commit data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update market data"
          file_pattern: data/market-data.json
