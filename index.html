<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Stocks" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <title>Stock Scanner</title>
    <style>
      :root {
        --ink: #0e1116;
        --panel: #f7f8f3;
        --line: #d9dfd0;
        --accent: #0f8b6f;
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0;
        min-height: 100dvh;
        background: radial-gradient(circle at 30% -10%, rgba(15,139,111,.16), transparent 38%), linear-gradient(180deg,#f4f6ef,#e8ede0);
        color: var(--ink);
        font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      }
      button, input { font: inherit; }
      .app { width: min(100%, 440px); min-height: 100dvh; margin: 0 auto; padding: max(12px,var(--safe-top)) 16px max(20px,var(--safe-bottom)); }
      .header { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; }
      .eyebrow { margin: 0; color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; }
      h1 { margin: 4px 0 0; font-size: 32px; line-height: 1; }
      .card { margin-top: 14px; padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,.88); box-shadow: 0 18px 55px rgba(13,20,30,.14); }
      .grid { display: grid; gap: 8px; }
      .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .button { min-height: 44px; border: 0; border-radius: 7px; background: var(--panel); color: var(--ink); font-weight: 900; touch-action: manipulation; }
      .button:active { transform: scale(.97); }
      .button.active { background: var(--accent); color: #fff; }
      .button.dark { background: var(--ink); color: #fff; }
      .button.outline { border: 1px solid var(--line); background: #fff; }
      .period-slots { margin-top: 10px; }
      .period-slots .button { min-height: 48px; border: 1px solid var(--line); background: #fff; font-size: 12px; }
      .period-slots .button.active { border-color: var(--accent); background: rgba(15,139,111,.1); color: var(--accent); }
      .section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-weight: 900; }
      .slider-row { display: block; margin-top: 10px; }
      .slider-meta { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; }
      .slider-value { color: var(--accent); }
      input[type="range"] { width: 100%; min-height: 36px; accent-color: var(--accent); }
      .actions { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; margin-top: 14px; }
      .advanced { margin-top: 14px; color: rgba(14,17,22,.68); font-size: 12px; font-weight: 800; }
      .advanced summary { min-height: 40px; cursor: pointer; }
      .api-input { min-height: 44px; width: 100%; border: 1px solid var(--line); border-radius: 7px; background: #fff; color: var(--ink); padding: 0 11px; font-size: 13px; font-weight: 700; }
      .message { display: none; margin-top: 12px; padding: 12px; border-radius: 8px; background: #fff7dd; color: #7a5300; font-size: 13px; font-weight: 800; }
      .message.show { display: block; }
      .ranking { margin-top: 14px; padding-bottom: 24px; }
      .empty { padding: 26px 18px; border: 1px dashed var(--line); border-radius: 8px; background: rgba(255,255,255,.58); color: rgba(14,17,22,.58); text-align: center; font-size: 14px; font-weight: 800; }
      .stock { margin-top: 8px; padding: 13px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
      .stock-top { display: flex; justify-content: space-between; gap: 12px; }
      .symbol { color: var(--accent); font-size: 12px; font-weight: 900; }
      .name { margin-top: 3px; font-size: 15px; font-weight: 900; }
      .main-value { text-align: right; font-size: 22px; font-weight: 900; }
      .main-label { color: rgba(14,17,22,.5); font-size: 10px; font-weight: 800; text-align: right; }
      .stock-metrics { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; margin-top: 11px; }
      .metric { border-radius: 7px; background: var(--panel); padding: 8px; text-align: center; }
      .metric-label { color: rgba(14,17,22,.5); font-size: 10px; font-weight: 800; text-transform: uppercase; }
      .metric-value { margin-top: 2px; font-size: 14px; font-weight: 900; }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="eyebrow">PWA Scanner</p>
          <h1>Stock Scanner</h1>
        </div>
        <button class="button outline" id="resetButton">Reset</button>
      </header>

      <section class="card">
        <div class="grid grid-2" id="marketButtons">
          <button class="button active" data-market="jp">日本株</button>
          <button class="button" data-market="us">米国株</button>
        </div>
        <div class="grid grid-3" id="periodTypeButtons" style="margin-top:10px">
          <button class="button active" data-period-type="weekly">週</button>
          <button class="button" data-period-type="monthly">月</button>
          <button class="button" data-period-type="half_year">半年</button>
        </div>
        <div class="grid grid-2 period-slots" id="periodSlotButtons"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <span>係数</span>
          <span id="targetReturn">短期急騰 / 目標 +10%</span>
        </div>
        <div id="sliders"></div>
      </section>

      <div class="actions">
        <button class="button dark" id="screenButton">スクリーニング</button>
        <button class="button outline" id="backtestButton">実績の見方</button>
      </div>

      <details class="advanced">
        <summary>外部FastAPIを使う場合だけ開く</summary>
        <input class="api-input" id="apiBaseUrlInput" placeholder="https://your-api.onrender.com" />
        <button class="button outline" id="saveApiButton" style="width:100%;margin-top:8px">API URLを保存</button>
      </details>

      <div class="message" id="message"></div>
      <section class="ranking" id="ranking">
        <div class="empty">スクリーニングを実行するとトップ10が表示されます。</div>
      </section>
    </main>

    <script>
      const API_URL_STORAGE_KEY = "stockScannerApiBaseUrl";
      const LOCAL_MARKET_DATA_URL = "./data/market-data.json";
      const YAHOO_CHART_URL = "https://query1.finance.yahoo.com/v8/finance/chart/";
      const targetReturns = { weekly: 10, monthly: 50, half_year: 300 };
      const horizons = { weekly: 5, monthly: 21, half_year: 126 };
      const ranges = { weekly: "6mo", monthly: "1y", half_year: "2y" };
      const targetLabels = { weekly: "短期急騰", monthly: "月次ブレイク", half_year: "大化け候補" };

      const periodSlots = {
        weekly: [["p3_to_p2", "3週前→2週前"], ["p2_to_p1", "2週前→1週前"], ["p1_to_now", "1週前→現在"], ["current_to_next", "現在→1週後"]],
        monthly: [["p3_to_p2", "3か月前→2か月前"], ["p2_to_p1", "2か月前→1か月前"], ["p1_to_now", "1か月前→現在"], ["current_to_next", "現在→1か月後"]],
        half_year: [["p3_to_p2", "18か月前→12か月前"], ["p2_to_p1", "12か月前→6か月前"], ["p1_to_now", "6か月前→現在"], ["current_to_next", "現在→6か月後"]]
      };

      const coefficientLabels = {
        per: "押し目余地",
        pbr: "過熱回避",
        roe: "値動き安定",
        sales_growth: "上昇継続力",
        moving_average: "トレンド",
        volume: "出来高確認",
        momentum: "モメンタム"
      };

      const defaultCoefficientPresets = {
        weekly: { per: 0.08, pbr: 0.12, roe: 0.08, sales_growth: 0.10, moving_average: 0.22, volume: 0.18, momentum: 0.22 },
        monthly: { per: 0.10, pbr: 0.10, roe: 0.12, sales_growth: 0.18, moving_average: 0.24, volume: 0.12, momentum: 0.14 },
        half_year: { per: 0.08, pbr: 0.12, roe: 0.18, sales_growth: 0.22, moving_average: 0.26, volume: 0.06, momentum: 0.08 }
      };

      const fallbackUniverse = {
        jp: [["7203.T", "トヨタ自動車"], ["6758.T", "ソニーグループ"], ["8035.T", "東京エレクトロン"], ["9984.T", "ソフトバンクグループ"], ["6861.T", "キーエンス"], ["7974.T", "任天堂"], ["6098.T", "リクルートホールディングス"], ["4063.T", "信越化学工業"], ["6501.T", "日立製作所"], ["8058.T", "三菱商事"], ["8306.T", "三菱UFJフィナンシャル・グループ"], ["9432.T", "日本電信電話"], ["9983.T", "ファーストリテイリング"], ["6857.T", "アドバンテスト"], ["7011.T", "三菱重工業"], ["5803.T", "フジクラ"], ["8001.T", "伊藤忠商事"], ["4568.T", "第一三共"], ["6702.T", "富士通"], ["4661.T", "オリエンタルランド"]],
        us: [["NVDA", "NVIDIA"], ["AAPL", "Apple"], ["MSFT", "Microsoft"], ["AMZN", "Amazon"], ["GOOGL", "Alphabet"], ["META", "Meta Platforms"], ["TSLA", "Tesla"], ["AVGO", "Broadcom"], ["AMD", "Advanced Micro Devices"], ["NFLX", "Netflix"], ["CRM", "Salesforce"], ["COST", "Costco"], ["PLTR", "Palantir Technologies"], ["CRWD", "CrowdStrike"], ["PANW", "Palo Alto Networks"], ["COIN", "Coinbase"], ["SMCI", "Super Micro Computer"], ["ASML", "ASML Holding"], ["LLY", "Eli Lilly"], ["V", "Visa"]]
      };

      const state = {
        market: "jp",
        periodType: "weekly",
        periodSlot: "current_to_next",
        coefficients: { ...defaultCoefficientPresets.weekly }
      };

      function clip(value, low = -1, high = 1) {
        return Number.isFinite(value) ? Math.max(low, Math.min(high, value)) : 0;
      }

      function mean(values) {
        const valid = values.filter(Number.isFinite);
        return valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : 0;
      }

      function stdev(values) {
        const avg = mean(values);
        const valid = values.filter(Number.isFinite);
        if (valid.length < 2) return 0;
        return Math.sqrt(mean(valid.map((value) => (value - avg) ** 2)));
      }

      function pctReturn(values, days) {
        if (values.length <= days) return 0;
        const latest = values[values.length - 1];
        const base = values[values.length - 1 - days];
        return base ? ((latest / base) - 1) * 100 : 0;
      }

      function setMessage(text) {
        const el = document.getElementById("message");
        el.textContent = text;
        el.classList.toggle("show", Boolean(text));
      }

      function getApiBaseUrl() {
        return document.getElementById("apiBaseUrlInput").value.trim().replace(/\/$/, "");
      }

      function saveApiUrl() {
        const url = getApiBaseUrl();
        if (url) localStorage.setItem(API_URL_STORAGE_KEY, url);
        else localStorage.removeItem(API_URL_STORAGE_KEY);
        setMessage(url ? "外部API URLを保存しました。" : "外部API URLを削除しました。");
      }

      function syncButtons() {
        document.querySelectorAll("[data-market]").forEach((button) => button.classList.toggle("active", button.dataset.market === state.market));
        document.querySelectorAll("[data-period-type]").forEach((button) => button.classList.toggle("active", button.dataset.periodType === state.periodType));
      }

      function renderSlots() {
        const root = document.getElementById("periodSlotButtons");
        root.innerHTML = periodSlots[state.periodType].map(([value, label]) => `<button class="button${value === state.periodSlot ? " active" : ""}" data-period-slot="${value}">${label}</button>`).join("");
        root.querySelectorAll("[data-period-slot]").forEach((button) => {
          button.addEventListener("click", () => {
            state.periodSlot = button.dataset.periodSlot;
            renderSlots();
            clearRanking();
          });
        });
      }

      function renderSliders() {
        const root = document.getElementById("sliders");
        root.innerHTML = Object.entries(coefficientLabels).map(([key, label]) => {
          const value = state.coefficients[key];
          return `<label class="slider-row"><span class="slider-meta"><span>${label}</span><span class="slider-value" id="value-${key}">${value.toFixed(2)}</span></span><input type="range" min="0" max="0.5" step="0.01" value="${value}" data-coefficient="${key}" /></label>`;
        }).join("");
        root.querySelectorAll("[data-coefficient]").forEach((input) => {
          input.addEventListener("input", () => {
            const key = input.dataset.coefficient;
            state.coefficients[key] = Number(input.value);
            document.getElementById(`value-${key}`).textContent = state.coefficients[key].toFixed(2);
            clearRanking();
          });
        });
      }

      function renderTarget() {
        document.getElementById("targetReturn").textContent = `${targetLabels[state.periodType]} / 目標 +${targetReturns[state.periodType]}%`;
      }

      function clearRanking() {
        document.getElementById("ranking").innerHTML = '<div class="empty">スクリーニングを実行するとトップ10が表示されます。</div>';
        setMessage("");
      }

      function renderRanking(items) {
        document.getElementById("ranking").innerHTML = items.map((item) => {
          const actual = item.actual_return == null ? "-" : `${item.actual_return.toFixed(1)}%`;
          return `<article class="stock"><div class="stock-top"><div><div class="symbol">#${item.rank} ${item.symbol}</div><div class="name">${item.name}</div></div><div><div class="main-value">${item.predicted_return.toFixed(1)}%</div><div class="main-label">期待上昇率</div></div></div><div class="stock-metrics"><div class="metric"><div class="metric-label">買い優先度</div><div class="metric-value">${item.grade}</div></div><div class="metric"><div class="metric-label">実績</div><div class="metric-value">${actual}</div></div></div></article>`;
        }).join("");
      }

      function getWindow(close, volume) {
        const horizon = horizons[state.periodType];
        if (state.periodSlot === "current_to_next") return { sourceClose: close, sourceVolume: volume, evaluationClose: null };
        const multiplier = state.periodSlot === "p1_to_now" ? 1 : state.periodSlot === "p2_to_p1" ? 2 : 3;
        const evalStart = close.length - horizon * multiplier;
        const evalEnd = close.length - horizon * (multiplier - 1);
        return { sourceClose: close.slice(0, evalStart), sourceVolume: volume.slice(0, evalStart), evaluationClose: close.slice(evalStart, evalEnd) };
      }

      async function fetchLocalMarketData() {
        const response = await fetch(`${LOCAL_MARKET_DATA_URL}?v=${Date.now()}`);
        if (!response.ok) throw new Error("同梱データを取得できませんでした");
        const json = await response.json();
        const items = json.markets?.[state.market] || [];
        if (!items.length) throw new Error("同梱データに対象市場がありません");
        return items;
      }

      async function fetchChart(symbol) {
        const url = `${YAHOO_CHART_URL}${encodeURIComponent(symbol)}?range=${ranges[state.periodType]}&interval=1d`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${symbol} を取得できませんでした`);
        const json = await response.json();
        const quote = json.chart?.result?.[0]?.indicators?.quote?.[0];
        if (!quote?.close?.length) throw new Error(`${symbol} に価格データがありません`);
        return { close: quote.close.filter(Number.isFinite), volume: quote.volume.filter(Number.isFinite) };
      }

      function scoreFromChart(symbol, name, close, volume) {
        const { sourceClose, sourceVolume, evaluationClose } = getWindow(close, volume);
        if (sourceClose.length < 30) return null;
        const latest = sourceClose[sourceClose.length - 1];
        const ma5 = mean(sourceClose.slice(-5));
        const ma25 = mean(sourceClose.slice(-25));
        const ma75 = mean(sourceClose.slice(-75));
        const recentReturn = pctReturn(sourceClose, 5);
        const monthlyReturn = pctReturn(sourceClose, 21);
        const quarterlyReturn = pctReturn(sourceClose, 63);
        const halfYearReturn = pctReturn(sourceClose, 126);
        const volume5 = mean(sourceVolume.slice(-5));
        const volume25 = mean(sourceVolume.slice(-25));
        const volumeChange = volume25 ? ((volume5 / volume25) - 1) * 100 : 0;
        const recentReturns = sourceClose.slice(-25).map((value, index, values) => index === 0 ? 0 : ((value / values[index - 1]) - 1) * 100).slice(1);
        const volatility = stdev(recentReturns);
        const high60 = Math.max(...sourceClose.slice(-60));
        const low60 = Math.min(...sourceClose.slice(-60));
        const distanceFromHigh = high60 ? ((latest / high60) - 1) * 100 : 0;
        const distanceFromLow = low60 ? ((latest / low60) - 1) * 100 : 0;

        const dipScore = clip((8 - Math.max(0, distanceFromHigh * -1)) / 8);
        const heatScore = clip((18 - Math.max(0, monthlyReturn)) / 18);
        const stabilityScore = clip((4.5 - volatility) / 4.5);
        const continuationScore = clip((monthlyReturn * 0.45 + quarterlyReturn * 0.35 + halfYearReturn * 0.20) / 35);
        const trendScore = clip((((ma5 / ma25) - 1) * 5 + ((ma25 / ma75) - 1) * 3) / 0.8);
        const volumeScore = clip(volumeChange / 100);
        const breakoutScore = clip((distanceFromHigh + 4) / 8);
        const momentumScore = clip((recentReturn * 0.55 + monthlyReturn * 0.30 + breakoutScore * 15) / 20);
        const weights = state.coefficients;
        const totalWeight = Object.values(weights).reduce((sum, value) => sum + value, 0) || 1;
        const rawScore = (
          weights.per * dipScore +
          weights.pbr * heatScore +
          weights.roe * stabilityScore +
          weights.sales_growth * continuationScore +
          weights.moving_average * trendScore +
          weights.volume * volumeScore +
          weights.momentum * momentumScore
        ) / totalWeight;
        const k = { weekly: 2.2, monthly: 1.8, half_year: 1.4 }[state.periodType];
        const probability = 100 / (1 + Math.exp(-k * rawScore));
        const predictedReturn = probability / 100 * targetReturns[state.periodType];
        const grade = predictedReturn >= targetReturns[state.periodType] * 0.72 ? "強" : predictedReturn >= targetReturns[state.periodType] * 0.58 ? "中" : "弱";
        const actualReturn = evaluationClose && evaluationClose.length > 1 ? ((evaluationClose[evaluationClose.length - 1] / evaluationClose[0]) - 1) * 100 : null;
        return { symbol, name, score: rawScore, probability, predicted_return: predictedReturn, grade, actual_return: actualReturn };
      }

      async function screenWithBrowserData() {
        let rows;
        try {
          const localItems = await fetchLocalMarketData();
          rows = localItems.map((item) => ({ status: "fulfilled", value: scoreFromChart(item.symbol, item.name, item.close, item.volume) }));
        } catch {
          rows = await Promise.allSettled(fallbackUniverse[state.market].map(async ([symbol, name]) => {
            const chart = await fetchChart(symbol);
            return scoreFromChart(symbol, name, chart.close, chart.volume);
          }));
        }
        return rows.filter((row) => row.status === "fulfilled" && row.value).map((row) => row.value).sort((a, b) => b.predicted_return - a.predicted_return).slice(0, 10).map((item, index) => ({ ...item, rank: index + 1 }));
      }

      function makePayload() {
        return { market: state.market, period_type: state.periodType, period_slot: state.periodSlot, coefficients: state.coefficients };
      }

      async function screenWithExternalApi(apiBaseUrl) {
        const response = await fetch(`${apiBaseUrl}/api/screen`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(makePayload()) });
        if (!response.ok) throw new Error(await response.text());
        const json = await response.json();
        return json.items.map((item) => ({ ...item, grade: item.predicted_return >= targetReturns[state.periodType] * 0.72 ? "強" : item.predicted_return >= targetReturns[state.periodType] * 0.58 ? "中" : "弱" }));
      }

      async function screen() {
        setMessage("株価データを読み込み中です...");
        try {
          const apiBaseUrl = getApiBaseUrl();
          const items = apiBaseUrl ? await screenWithExternalApi(apiBaseUrl) : await screenWithBrowserData();
          if (!items.length) throw new Error("表示できる銘柄がありませんでした");
          renderRanking(items);
          setMessage(`${state.market === "jp" ? "日本株" : "米国株"}の推奨ユニバースから${items.length}銘柄を表示しています。トレンド、出来高、過熱感、値動き安定性を組み合わせています。`);
        } catch (error) {
          setMessage(`取得に失敗しました: ${error.message || error}`);
        }
      }

      function backtest() {
        setMessage("過去期間を選んでスクリーニングすると、その期間の実績上昇率を確認できます。");
      }

      function reset() {
        state.market = "jp";
        state.periodType = "weekly";
        state.periodSlot = "current_to_next";
        state.coefficients = { ...defaultCoefficientPresets.weekly };
        syncButtons();
        renderSlots();
        renderSliders();
        renderTarget();
        clearRanking();
      }

      function init() {
        document.querySelectorAll("[data-market]").forEach((button) => {
          button.addEventListener("click", () => {
            state.market = button.dataset.market;
            syncButtons();
            clearRanking();
          });
        });
        document.querySelectorAll("[data-period-type]").forEach((button) => {
          button.addEventListener("click", () => {
            state.periodType = button.dataset.periodType;
            state.periodSlot = "current_to_next";
            state.coefficients = { ...defaultCoefficientPresets[state.periodType] };
            syncButtons();
            renderSlots();
            renderSliders();
            renderTarget();
            clearRanking();
          });
        });
        document.getElementById("screenButton").addEventListener("click", screen);
        document.getElementById("backtestButton").addEventListener("click", backtest);
        document.getElementById("resetButton").addEventListener("click", reset);
        document.getElementById("saveApiButton").addEventListener("click", saveApiUrl);
        document.getElementById("apiBaseUrlInput").value = localStorage.getItem(API_URL_STORAGE_KEY) || "";
        renderSlots();
        renderSliders();
        renderTarget();
        if ("serviceWorker" in navigator) navigator.serviceWorker.register("./service-worker.js").catch(() => undefined);
      }

      init();
    </script>
  </body>
</html>
