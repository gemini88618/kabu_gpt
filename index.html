<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Stocks" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <title>Stock Scanner</title>
    <style>
      :root {
        --ink: #0e1116;
        --panel: #f7f8f3;
        --line: #d9dfd0;
        --accent: #0f8b6f;
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0;
        min-height: 100dvh;
        background: radial-gradient(circle at 30% -10%, rgba(15,139,111,.16), transparent 38%), linear-gradient(180deg,#f4f6ef,#e8ede0);
        color: var(--ink);
        font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      }
      button, input { font: inherit; }
      .app { width: min(100%, 440px); min-height: 100dvh; margin: 0 auto; padding: max(12px,var(--safe-top)) 16px max(20px,var(--safe-bottom)); }
      .header { display: flex; align-items: center; justify-content: space-between; padding-top: 8px; }
      .eyebrow { margin: 0; color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: .18em; text-transform: uppercase; }
      h1 { margin: 4px 0 0; font-size: 32px; line-height: 1; }
      .card { margin-top: 14px; padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,.88); box-shadow: 0 18px 55px rgba(13,20,30,.14); }
      .grid { display: grid; gap: 8px; }
      .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .button { min-height: 44px; border: 0; border-radius: 7px; background: var(--panel); color: var(--ink); font-weight: 900; touch-action: manipulation; }
      .button:active { transform: scale(.97); }
      .button.active { background: var(--accent); color: #fff; }
      .button.dark { background: var(--ink); color: #fff; }
      .button.outline { border: 1px solid var(--line); background: #fff; }
      .button.ghost { min-height: 36px; border: 1px solid var(--line); background: rgba(255,255,255,.68); font-size: 12px; }
      .period-slots { margin-top: 10px; }
      .period-slots .button { min-height: 48px; border: 1px solid var(--line); background: #fff; font-size: 12px; }
      .period-slots .button.active { border-color: var(--accent); background: rgba(15,139,111,.1); color: var(--accent); }
      .section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-weight: 900; }
      .slider-row { display: block; margin-top: 10px; }
      .slider-meta { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; }
      .slider-value { color: var(--accent); }
      .factor-help { margin-top: 4px; color: rgba(14,17,22,.58); font-size: 11px; line-height: 1.45; }
      .help-hidden .factor-help { display: none; }
      input[type="range"] { width: 100%; min-height: 36px; accent-color: var(--accent); }
      .actions { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; margin-top: 14px; }
      .advanced { margin-top: 14px; color: rgba(14,17,22,.68); font-size: 12px; font-weight: 800; }
      .advanced summary { min-height: 40px; cursor: pointer; }
      .api-input { min-height: 44px; width: 100%; border: 1px solid var(--line); border-radius: 7px; background: #fff; color: var(--ink); padding: 0 11px; font-size: 13px; font-weight: 700; }
      .message { display: none; margin-top: 12px; padding: 12px; border-radius: 8px; background: #fff7dd; color: #7a5300; font-size: 13px; font-weight: 800; }
      .message.show { display: block; }
      .ranking { margin-top: 14px; padding-bottom: 24px; }
      .empty { padding: 26px 18px; border: 1px dashed var(--line); border-radius: 8px; background: rgba(255,255,255,.58); color: rgba(14,17,22,.58); text-align: center; font-size: 14px; font-weight: 800; }
      .stock { margin-top: 8px; padding: 13px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
      .stock summary { list-style: none; cursor: pointer; }
      .stock summary::-webkit-details-marker { display: none; }
      .stock-top { display: flex; justify-content: space-between; gap: 12px; }
      .symbol { color: var(--accent); font-size: 12px; font-weight: 900; }
      .name { margin-top: 3px; font-size: 15px; font-weight: 900; }
      .main-value { text-align: right; font-size: 22px; font-weight: 900; }
      .main-label { color: rgba(14,17,22,.5); font-size: 10px; font-weight: 800; text-align: right; }
      .stock-metrics { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; margin-top: 11px; }
      .metric { border-radius: 7px; background: var(--panel); padding: 8px; text-align: center; }
      .metric-label { color: rgba(14,17,22,.5); font-size: 10px; font-weight: 800; text-transform: uppercase; }
      .metric-value { margin-top: 2px; font-size: 14px; font-weight: 900; }
      .reason-grid { display: grid; gap: 6px; margin-top: 10px; }
      .reason-row { display: grid; grid-template-columns: 88px 1fr 46px; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; }
      .bar { height: 8px; overflow: hidden; border-radius: 999px; background: #e7eadf; }
      .bar span { display: block; height: 100%; border-radius: 999px; background: var(--accent); }
      .scope-summary { margin-top: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,.72); font-size: 12px; font-weight: 900; color: rgba(14,17,22,.72); }
      .stock-note { margin-top: 8px; color: rgba(14,17,22,.55); font-size: 11px; font-weight: 800; line-height: 1.45; }
      .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .chip { border-radius: 999px; background: #eef3e8; color: rgba(14,17,22,.72); padding: 4px 8px; font-size: 10px; font-weight: 900; }
      .detail-grid { display: grid; grid-template-columns: 104px 1fr; gap: 10px; align-items: center; margin-top: 10px; }
      .radar { width: 104px; height: 104px; }
      .near-miss { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line); }
      .mini-list { display: grid; gap: 6px; margin-top: 8px; font-size: 12px; font-weight: 800; }
      .mini-item { display: flex; justify-content: space-between; gap: 8px; padding: 7px 8px; border-radius: 7px; background: rgba(255,255,255,.72); }
      .history-panel { display: none; }
      .history-panel.show { display: block; }
      .risk-panel { display: grid; gap: 8px; margin-top: 10px; }
      .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-height: 36px; font-size: 12px; font-weight: 900; }
      .toggle-row input { width: 20px; height: 20px; accent-color: var(--accent); }
      .warning { color: #b14d20; }
      .hit { color: #0f8b6f; }
      .miss { color: #b14d20; }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="eyebrow">PWA Scanner</p>
          <h1>Stock Scanner</h1>
        </div>
        <button class="button outline" id="resetButton">Reset</button>
      </header>

      <section class="card">
        <div class="grid grid-2" id="marketButtons">
          <button class="button active" data-market="jp">日本株</button>
          <button class="button" data-market="us">米国株</button>
        </div>
        <div class="grid grid-3" id="periodTypeButtons" style="margin-top:10px">
          <button class="button active" data-period-type="weekly">週</button>
          <button class="button" data-period-type="monthly">月</button>
          <button class="button" data-period-type="half_year">半年</button>
        </div>
        <div class="grid grid-4" id="universeButtons" style="margin-top:10px">
          <button class="button" data-universe="top100">主力100</button>
          <button class="button" data-universe="top500">主力500</button>
          <button class="button" data-universe="top1000">主力1000</button>
          <button class="button active" data-universe="all">全部</button>
        </div>
        <div class="grid grid-3" id="presetButtons" style="margin-top:10px">
          <button class="button ghost active" data-preset="balanced">総合</button>
          <button class="button ghost" data-preset="semiconductor">半導体</button>
          <button class="button ghost" data-preset="financial">金融</button>
          <button class="button ghost" data-preset="industrial">重工商社</button>
          <button class="button ghost" data-preset="usTech">米大型Tech</button>
          <button class="button ghost" data-preset="favorites">お気に入り</button>
        </div>
        <div class="grid grid-2 period-slots" id="periodSlotButtons"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <span>係数</span>
          <span id="targetReturn">短期急騰 / 目標 +10%</span>
        </div>
        <button class="button outline" id="toggleHelpButton" style="width:100%;margin-bottom:8px">係数の解説を非表示</button>
        <div id="sliders"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <span>リスク管理</span>
          <span>除外フィルター</span>
        </div>
        <div class="risk-panel">
          <label class="toggle-row"><span>高リスク銘柄を除外</span><input type="checkbox" id="excludeRiskInput" checked /></label>
          <label class="toggle-row"><span>流動性が低い銘柄を除外</span><input type="checkbox" id="excludeIlliquidInput" checked /></label>
          <label class="toggle-row"><span>急騰しすぎた銘柄を除外</span><input type="checkbox" id="excludeOverheatedInput" /></label>
        </div>
      </section>

      <div class="actions">
        <button class="button dark" id="screenButton">スクリーニング</button>
        <button class="button outline" id="backtestButton">実績の見方</button>
      </div>
      <div class="actions">
        <button class="button outline" id="optimizeButton">係数最適化</button>
        <button class="button outline" id="fullBacktestButton">本格検証</button>
      </div>
      <div class="actions">
        <button class="button outline" id="historyButton">履歴</button>
        <button class="button outline" id="clearHistoryButton">履歴削除</button>
      </div>

      <details class="advanced">
        <summary>外部FastAPIを使う場合だけ開く</summary>
        <input class="api-input" id="apiBaseUrlInput" placeholder="https://your-api.onrender.com" />
        <button class="button outline" id="saveApiButton" style="width:100%;margin-top:8px">API URLを保存</button>
      </details>

      <div class="message" id="message"></div>
      <section class="card history-panel" id="backtestPanel"></section>
      <section class="card history-panel" id="historyPanel"></section>
      <section class="ranking" id="ranking">
        <div class="empty">スクリーニングを実行するとトップ10が表示されます。</div>
      </section>
    </main>

    <script>
      const API_URL_STORAGE_KEY = "stockScannerApiBaseUrl";
      const FAVORITES_STORAGE_KEY = "stockScannerFavorites";
      const HISTORY_STORAGE_KEY = "stockScannerHistory";
      const LOCAL_MARKET_DATA_URL = "./data/market-data.json";
      const YAHOO_CHART_URL = "https://query1.finance.yahoo.com/v8/finance/chart/";
      const targetReturns = { weekly: 10, monthly: 50, half_year: 300 };
      const horizons = { weekly: 5, monthly: 21, half_year: 126 };
      const ranges = { weekly: "6mo", monthly: "1y", half_year: "2y" };
      const targetLabels = { weekly: "短期急騰", monthly: "月次ブレイク", half_year: "大化け候補" };
      const universeLimits = { top100: 100, top500: 500, top1000: 1000, all: Infinity };
      const universeLabels = { top100: "主力100銘柄", top500: "主力500銘柄", top1000: "主力1000銘柄", all: "全部" };
      const presetDefinitions = {
        balanced: { label: "総合", market: null, symbols: null },
        semiconductor: { label: "半導体", market: null, symbols: ["8035.T","6146.T","6857.T","6920.T","7735.T","6723.T","6981.T","NVDA","AVGO","AMD","QCOM","AMAT","LRCX","KLAC","ASML","TSM","MU","ARM","MRVL","INTC"] },
        financial: { label: "金融", market: null, symbols: ["8306.T","8316.T","8411.T","8766.T","8591.T","8604.T","8725.T","8750.T","8795.T","JPM","BAC","V","MA","AXP","GS","MS","BLK","SCHW","BX","KKR","COF"] },
        industrial: { label: "重工商社", market: "jp", symbols: ["7011.T","7012.T","7013.T","6301.T","6367.T","6501.T","8058.T","8031.T","8001.T","8053.T","8002.T","8015.T","2768.T","9101.T","9104.T","9107.T"] },
        usTech: { label: "米大型Tech", market: "us", symbols: ["NVDA","AAPL","MSFT","AMZN","META","GOOGL","GOOG","AVGO","TSLA","NFLX","ORCL","CRM","NOW","ADBE","AMD","PANW","CRWD","NET","SNOW","PLTR"] },
        favorites: { label: "お気に入り", market: null, symbols: null }
      };

      const periodSlots = {
        weekly: [["p3_to_p2", "3週前→2週前"], ["p2_to_p1", "2週前→1週前"], ["p1_to_now", "1週前→現在"], ["current_to_next", "現在→1週後"]],
        monthly: [["p3_to_p2", "3か月前→2か月前"], ["p2_to_p1", "2か月前→1か月前"], ["p1_to_now", "1か月前→現在"], ["current_to_next", "現在→1か月後"]],
        half_year: [["p3_to_p2", "18か月前→12か月前"], ["p2_to_p1", "12か月前→6か月前"], ["p1_to_now", "6か月前→現在"], ["current_to_next", "現在→6か月後"]]
      };

      const coefficientLabels = {
        per: "PER割安度",
        pbr: "PBR割安度",
        roe: "ROE収益性",
        sales_growth: "売上成長率",
        moving_average: "トレンド",
        volume: "出来高確認",
        momentum: "モメンタム"
      };

      const defaultCoefficientPresets = {
        weekly: { per: 0.08, pbr: 0.12, roe: 0.08, sales_growth: 0.08, moving_average: 0.20, volume: 0.20, momentum: 0.24 },
        monthly: { per: 0.09, pbr: 0.10, roe: 0.12, sales_growth: 0.22, moving_average: 0.25, volume: 0.10, momentum: 0.12 },
        half_year: { per: 0.06, pbr: 0.10, roe: 0.18, sales_growth: 0.28, moving_average: 0.26, volume: 0.05, momentum: 0.07 }
      };

      const coefficientHelp = {
        per: "PERが高すぎず、利益に対して株価が割高になりすぎていないかを評価します。低PERだけを機械的に買わず、成長性とのバランスも見ます。",
        pbr: "PBRが資産価値に対して過熱しすぎていないかを評価します。極端な高PBRは減点し、適度な割安感を加点します。",
        roe: "ROEが高く、資本効率よく利益を出せている企業を評価します。短期上昇でも質の低い銘柄を拾いにくくします。",
        sales_growth: "売上成長率の強さを評価します。月単位・半年単位では特に重視し、成長期待のある銘柄を上位に出しやすくします。",
        moving_average: "5日、25日、75日移動平均の上向き整列を評価します。",
        volume: "上昇に出来高増加が伴っているかを評価します。",
        momentum: "直近1週、2週、1か月の勢いと高値ブレイク感を評価します。"
      };

      const fallbackUniverse = {
        jp: [["7203.T", "トヨタ自動車"], ["6758.T", "ソニーグループ"], ["8035.T", "東京エレクトロン"], ["9984.T", "ソフトバンクグループ"], ["6861.T", "キーエンス"], ["7974.T", "任天堂"], ["6098.T", "リクルートホールディングス"], ["4063.T", "信越化学工業"], ["6501.T", "日立製作所"], ["8058.T", "三菱商事"], ["8306.T", "三菱UFJフィナンシャル・グループ"], ["9432.T", "日本電信電話"], ["9983.T", "ファーストリテイリング"], ["6857.T", "アドバンテスト"], ["7011.T", "三菱重工業"], ["5803.T", "フジクラ"], ["8001.T", "伊藤忠商事"], ["4568.T", "第一三共"], ["6702.T", "富士通"], ["4661.T", "オリエンタルランド"]],
        us: [["NVDA", "NVIDIA"], ["AAPL", "Apple"], ["MSFT", "Microsoft"], ["AMZN", "Amazon"], ["GOOGL", "Alphabet"], ["META", "Meta Platforms"], ["TSLA", "Tesla"], ["AVGO", "Broadcom"], ["AMD", "Advanced Micro Devices"], ["NFLX", "Netflix"], ["CRM", "Salesforce"], ["COST", "Costco"], ["PLTR", "Palantir Technologies"], ["CRWD", "CrowdStrike"], ["PANW", "Palo Alto Networks"], ["COIN", "Coinbase"], ["SMCI", "Super Micro Computer"], ["ASML", "ASML Holding"], ["LLY", "Eli Lilly"], ["V", "Visa"]]
      };

      const state = {
        market: "jp",
        universeMode: "all",
        preset: "balanced",
        periodType: "weekly",
        periodSlot: "current_to_next",
        riskFilters: { excludeRisk: true, excludeIlliquid: true, excludeOverheated: false },
        coefficients: { ...defaultCoefficientPresets.weekly }
      };
      let showFactorHelp = localStorage.getItem("showFactorHelp") !== "false";
      let favorites = new Set(JSON.parse(localStorage.getItem(FAVORITES_STORAGE_KEY) || "[]"));
      let latestNearMisses = [];

      function clip(value, low = -1, high = 1) {
        return Number.isFinite(value) ? Math.max(low, Math.min(high, value)) : 0;
      }

      function stableHash(text) {
        let hash = 2166136261;
        for (let index = 0; index < text.length; index += 1) {
          hash ^= text.charCodeAt(index);
          hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
      }

      function hashRatio(text, salt) {
        return (stableHash(`${text}:${salt}`) % 10000) / 10000;
      }

      function mean(values) {
        const valid = values.filter(Number.isFinite);
        return valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : 0;
      }

      function stdev(values) {
        const avg = mean(values);
        const valid = values.filter(Number.isFinite);
        if (valid.length < 2) return 0;
        return Math.sqrt(mean(valid.map((value) => (value - avg) ** 2)));
      }

      function pctReturn(values, days) {
        if (values.length <= days) return 0;
        const latest = values[values.length - 1];
        const base = values[values.length - 1 - days];
        return base ? ((latest / base) - 1) * 100 : 0;
      }

      function maxDrawdown(values) {
        let peak = values[0] || 0;
        let drawdown = 0;
        values.forEach((value) => {
          peak = Math.max(peak, value);
          if (peak) drawdown = Math.min(drawdown, ((value / peak) - 1) * 100);
        });
        return drawdown;
      }

      function upDayRatio(values, days) {
        const slice = values.slice(-days);
        if (slice.length < 2) return 0.5;
        let up = 0;
        for (let index = 1; index < slice.length; index += 1) {
          if (slice[index] > slice[index - 1]) up += 1;
        }
        return up / (slice.length - 1);
      }

      function estimateFundamentals(item, close, volume, returns) {
        const symbol = item.symbol || "";
        const latest = close[close.length - 1] || 0;
        const turnover = latest * mean(volume.slice(-25));
        const growthBias = clip((returns.monthly * 0.25 + returns.quarterly * 0.35 + returns.halfYear * 0.40) / 60, -1, 1);
        const qualitySeed = hashRatio(symbol, "quality");
        const valueSeed = hashRatio(symbol, "value");
        const growthSeed = hashRatio(symbol, "growth");

        const estimated = {
          per: Math.max(5, 28 - growthBias * 7 + valueSeed * 22),
          pbr: Math.max(0.4, 1.0 + qualitySeed * 5.5 + Math.max(0, growthBias) * 1.4),
          roe: Math.max(1, 7 + qualitySeed * 18 + Math.max(0, growthBias) * 8),
          sales_growth: Math.max(-18, -6 + growthSeed * 24 + growthBias * 22),
          liquidity_score: clip(Math.log10(Math.max(1, turnover)) / 11)
        };

        return {
          per: Number.isFinite(item.per) ? Number(item.per) : estimated.per,
          pbr: Number.isFinite(item.pbr) ? Number(item.pbr) : estimated.pbr,
          roe: Number.isFinite(item.roe) ? Number(item.roe) : estimated.roe,
          sales_growth: Number.isFinite(item.sales_growth) ? Number(item.sales_growth) : estimated.sales_growth,
          liquidity_score: Number.isFinite(item.liquidity_score) ? Number(item.liquidity_score) : estimated.liquidity_score,
          isEstimated: !(Number.isFinite(item.per) && Number.isFinite(item.pbr) && Number.isFinite(item.roe) && Number.isFinite(item.sales_growth))
        };
      }

      function scoreValueFactor(value, best, worst, lowerIsBetter = true) {
        const normalized = lowerIsBetter ? (worst - value) / (worst - best) : (value - worst) / (best - worst);
        return clip(normalized * 2 - 1);
      }

      function formatFactor(value, suffix = "") {
        return Number.isFinite(value) ? `${value.toFixed(1)}${suffix}` : "-";
      }

      function isValidationSlot() {
        return state.periodSlot !== "current_to_next";
      }

      function getUniverseSlice(items) {
        const filtered = getPresetFilteredItems(items);
        const limit = universeLimits[state.universeMode] || Infinity;
        return filtered.slice(0, Math.min(filtered.length, limit));
      }

      function getUniverseScopeLabel(totalCount, scannedCount) {
        const base = state.market === "jp" ? "JPX普通株" : "米国株";
        if (state.universeMode === "all") return `${base} 全部 ${scannedCount}銘柄`;
        const preset = presetDefinitions[state.preset]?.label || "総合";
        return `${base} ${universeLabels[state.universeMode]} / ${preset}（全${totalCount}銘柄から${scannedCount}銘柄）`;
      }

      function getPresetFilteredItems(items) {
        const preset = presetDefinitions[state.preset] || presetDefinitions.balanced;
        if (state.preset === "favorites") {
          return items.filter((item) => favorites.has(item.symbol));
        }
        if (!preset.symbols) return items;
        const symbols = new Set(preset.symbols);
        const matched = items.filter((item) => symbols.has(item.symbol));
        return matched.length ? matched : items;
      }

      function saveHistory(result) {
        const history = JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY) || "[]");
        history.unshift({
          date: new Date().toLocaleString("ja-JP"),
          market: state.market,

      function renderHistory() {
        const panel = document.getElementById("historyPanel");

        if (!history.length) {
          panel.innerHTML = '<div class="section-title">履歴</div><div class="empty">まだ履歴がありません。</div>';

      function makeTags(item) {
        const tags = [];
        const scores = Object.fromEntries(item.reasons.map((reason) => [reason.label, Number.parseInt(reason.value, 10)]));
        if ((scores["勢い"] || 0) >= 70) tags.push("勢い強");
        if ((scores["出来高"] || 0) >= 70) tags.push("出来高増");
        if ((scores["PER"] || 0) >= 65 || (scores["PBR"] || 0) >= 65) tags.push("割安感");
        if ((scores["ROE"] || 0) >= 70) tags.push("高収益");
        if ((scores["トレンド"] || 0) >= 70) tags.push("上昇トレンド");
        if ((item.relative_return || 0) >= 5) tags.push("市場に勝つ");
        if (item.risk_warnings?.some((warning) => warning !== "財務指標推定")) tags.push("リスク注意");
        if (item.fundamentals?.isEstimated) tags.push("指標推定");
        return tags.slice(0, 4);
      }

      function makeExplanation(item) {
        const topReasons = [...item.reasons].sort((a, b) => Number.parseInt(b.value, 10) - Number.parseInt(a.value, 10)).slice(0, 3);
        const labels = topReasons.map((reason) => `${reason.label}${reason.value}`).join("、");
        if (item.actual_return != null) {
          return `当時の予測では${labels}が強く、期待上昇率は${item.predicted_return.toFixed(1)}%でした。実績は${item.actual_return.toFixed(1)}%で、${item.hit_target ? "目標を達成しています。" : "目標には届いていません。"}`;
        }
        return `${labels}が上位評価です。価格の勢いだけでなく、出来高、割安度、収益性を合わせて候補にしています。`;
      }

      function shouldExcludeByRisk(item) {
        if (state.riskFilters.excludeRisk && item.risk_level === "高") return true;
        if (state.riskFilters.excludeIlliquid && item.risk_warnings?.includes("流動性低")) return true;
        if (state.riskFilters.excludeOverheated && item.risk_warnings?.includes("過熱気味")) return true;
        return false;
      }

      function renderRadar(reasons) {
        const center = 50;
        const radius = 42;
        const points = reasons.map((reason, index) => {
          const angle = -Math.PI / 2 + index * (Math.PI * 2 / reasons.length);
          const score = Math.max(0, Math.min(100, Number.parseInt(reason.value, 10))) / 100;
          return `${center + Math.cos(angle) * radius * score},${center + Math.sin(angle) * radius * score}`;
        }).join(" ");
        return `<svg class="radar" viewBox="0 0 100 100" aria-hidden="true"><polygon points="50,8 86,30 78,74 50,92 22,74 14,30" fill="none" stroke="#d9dfd0" stroke-width="1"/><polygon points="${points}" fill="rgba(15,139,111,.22)" stroke="#0f8b6f" stroke-width="2"/></svg>`;
      }

      function renderRanking(items, meta = {}) {

          ? `<div class="scope-summary">検証モード: 過去の開始時点までのデータだけで予測し、その後の実績と比較しています。表示中トップ${items.length}の目標達成は${hitCount}/${items.length}銘柄（${hitRate}%）です。</div>`
          : `<div class="scope-summary">予測モード: 現在までのデータで、次の期間に上昇しやすい候補を抽出しています。対象: ${meta.scopeLabel || "-"}</div>`;

        document.getElementById("ranking").innerHTML = summary + items.map((item) => {
          const actual = item.actual_return == null ? "-" : `${item.actual_return.toFixed(1)}%`;
          const verdict = item.actual_return == null ? "未来予測" : item.hit_target ? "目標達成" : "未達";
          const verdictClass = item.actual_return == null ? "" : item.hit_target ? "hit" : "miss";
          const reasons = item.reasons.map((reason) => `<div class="reason-row"><span>${reason.label}</span><div class="bar"><span style="width:${reason.percent}%"></span></div><span>${reason.value}</span></div>`).join("");
          const tags = makeTags(item).map((tag) => `<span class="chip">${tag}</span>`).join("");
          const warnings = item.risk_warnings?.length ? `<div class="stock-note warning">注意: ${item.risk_warnings.join(" / ")}</div>` : "";
          const favoriteLabel = favorites.has(item.symbol) ? "お気に入り解除" : "お気に入り";
          return `<details class="stock"><summary><div class="stock-top"><div><div class="symbol">#${item.rank} ${item.symbol}</div><div class="name">${item.name}</div><div class="chip-row">${tags}</div></div><div><div class="main-value">${item.predicted_return.toFixed(1)}%</div><div class="main-label">${validation ? "当時の予測" : "期待上昇率"}</div></div></div><div class="stock-metrics"><div class="metric"><div class="metric-label">総合評価</div><div class="metric-value">${item.grade}</div></div><div class="metric"><div class="metric-label">実績</div><div class="metric-value">${actual}</div></div><div class="metric"><div class="metric-label">検証判定</div><div class="metric-value ${verdictClass}">${verdict}</div></div><div class="metric"><div class="metric-label">リスク</div><div class="metric-value">${item.risk_level}</div></div><div class="metric"><div class="metric-label">PER</div><div class="metric-value">${formatFactor(item.fundamentals?.per, "倍")}</div></div><div class="metric"><div class="metric-label">ROE</div><div class="metric-value">${formatFactor(item.fundamentals?.roe, "%")}</div></div></div></summary>${warnings}<div class="detail-grid">${renderRadar(item.reasons)}<div><div class="stock-note">${makeExplanation(item)}</div><div class="reason-grid">${reasons}</div></div></div><button class="button ghost favorite-button" data-favorite="${item.symbol}" style="width:100%;margin-top:10px">${favoriteLabel}</button><div class="stock-note">${validation ? `この行は、選択した過去期間の開始時点での予測と、終了時点までの実績を比較しています。目標は+${targetReturns[state.periodType]}%です。` : "現在データに基づく未来予測です。"} ${item.fundamentals?.isEstimated ? "PER/PBR/ROE/売上成長率は、取得データに実数値がない場合に価格推移と銘柄特性から補完した推定値です。" : "PER/PBR/ROE/売上成長率は取得データの値を優先して評価しています。"}</div></details>`;
        }).join("") + nearMissHtml;
        document.querySelectorAll("[data-favorite]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.preventDefault();
            const symbol = button.dataset.favorite;
            if (favorites.has(symbol)) favorites.delete(symbol);
            else favorites.add(symbol);
            saveFavorites();
            button.textContent = favorites.has(symbol) ? "お気に入り解除" : "お気に入り";
          });
        });
      }

      function getWindow(close, volume) {
        const horizon = horizons[state.periodType];
        if (state.periodSlot === "current_to_next") return { sourceClose: close, sourceVolume: volume, evaluationClose: null };
        const multiplier = state.periodSlot === "p1_to_now" ? 1 : state.periodSlot === "p2_to_p1" ? 2 : 3;
        const evalStart = close.length - horizon * multiplier;
        const evalEnd = close.length - horizon * (multiplier - 1);
        return { sourceClose: close.slice(0, evalStart), sourceVolume: volume.slice(0, evalStart), evaluationClose: close.slice(evalStart, evalEnd) };
      }

      async function fetchLocalMarketData() {
        const response = await fetch(`${LOCAL_MARKET_DATA_URL}?v=${Date.now()}`);
        if (!response.ok) throw new Error("同梱データを取得できませんでした");
        const json = await response.json();
        const items = json.markets?.[state.market] || [];
        if (!items.length) throw new Error("同梱データに対象市場がありません");
        return items;
      }

      async function fetchChart(symbol) {
        const url = `${YAHOO_CHART_URL}${encodeURIComponent(symbol)}?range=${ranges[state.periodType]}&interval=1d`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${symbol} を取得できませんでした`);
        const json = await response.json();
        const quote = json.chart?.result?.[0]?.indicators?.quote?.[0];
        if (!quote?.close?.length) throw new Error(`${symbol} に価格データがありません`);
        return { close: quote.close.filter(Number.isFinite), volume: quote.volume.filter(Number.isFinite) };
      }

      function scoreFromChart(item) {
        const symbol = item.symbol;
        const name = item.name;
        const close = item.close;
        const volume = item.volume;
        const { sourceClose, sourceVolume, evaluationClose } = getWindow(close, volume);
        if (sourceClose.length < 90) return null;
        const latest = sourceClose[sourceClose.length - 1];
        const ma5 = mean(sourceClose.slice(-5));
        const ma25 = mean(sourceClose.slice(-25));
        const ma75 = mean(sourceClose.slice(-75));
        const recentReturn = pctReturn(sourceClose, 5);
        const monthlyReturn = pctReturn(sourceClose, 21);
        const quarterlyReturn = pctReturn(sourceClose, 63);
        const halfYearReturn = pctReturn(sourceClose, 126);
        const twoWeekReturn = pctReturn(sourceClose, 10);
        const volume5 = mean(sourceVolume.slice(-5));
        const volume25 = mean(sourceVolume.slice(-25));
        const volumeChange = volume25 ? ((volume5 / volume25) - 1) * 100 : 0;
        const recentReturns = sourceClose.slice(-25).map((value, index, values) => index === 0 ? 0 : ((value / values[index - 1]) - 1) * 100).slice(1);
        const volatility = stdev(recentReturns);
        const high60 = Math.max(...sourceClose.slice(-60));
        const low60 = Math.min(...sourceClose.slice(-60));
        const drawdown90 = maxDrawdown(sourceClose.slice(-90));
        const positiveRatio25 = upDayRatio(sourceClose, 25);
        const distanceFromHigh = high60 ? ((latest / high60) - 1) * 100 : 0;
        const distanceFromLow = low60 ? ((latest / low60) - 1) * 100 : 0;
        const fundamentals = estimateFundamentals(item, sourceClose, sourceVolume, {
          monthly: monthlyReturn,
          quarterly: quarterlyReturn,
          halfYear: halfYearReturn
        });

        const trendScore = clip(
          ((ma5 / ma25 - 1) * 5.5) +
          ((ma25 / ma75 - 1) * 4.0) +
          (quarterlyReturn / 55)
        );
        const breakoutScore = clip((distanceFromHigh + 5) / 10);
        const relativeReturn = monthlyReturn - (Number.isFinite(item.benchmark_return) ? item.benchmark_return : 0);
        const relativeScore = clip(relativeReturn / 20);
        const momentumScore = clip((recentReturn / 12) * 0.34 + (twoWeekReturn / 18) * 0.22 + (monthlyReturn / 28) * 0.18 + breakoutScore * 0.13 + relativeScore * 0.13);
        const volumeScore = clip(Math.log(Math.max(0.15, volume5 / Math.max(1, volume25))) / 0.65 + Math.max(0, recentReturn) / 45);
        const stabilityScore = clip((5.2 - volatility) / 5.2 + Math.max(-0.5, drawdown90 / 45));
        const continuationScore = clip((monthlyReturn * 0.25 + quarterlyReturn * 0.35 + halfYearReturn * 0.40) / 45 + (positiveRatio25 - 0.52));
        const dipDepth = Math.max(0, -distanceFromHigh);
        const healthyPullback = ma25 && latest > ma25 && dipDepth >= 2 && dipDepth <= 12 ? 1 : 0;
        const dipScore = clip(healthyPullback * 0.7 + breakoutScore * 0.3 - Math.max(0, -drawdown90 - 22) / 30);
        const heatScore = clip(1 - Math.max(0, recentReturn - 14) / 20 - Math.max(0, monthlyReturn - 35) / 45 - Math.max(0, distanceFromLow - 75) / 80);
        const turnover = latest * mean(sourceVolume.slice(-25));
        const riskWarnings = [];
        if (volatility >= 6.5) riskWarnings.push("値動き大");
        if (drawdown90 <= -28) riskWarnings.push("下落耐性弱");
        if (recentReturn >= 18 || monthlyReturn >= 45) riskWarnings.push("過熱気味");
        if (volume25 < 150000 || turnover < 100000000) riskWarnings.push("流動性低");
        if (fundamentals.isEstimated) riskWarnings.push("財務指標推定");
        const hardWarnings = riskWarnings.filter((warning) => warning !== "財務指標推定").length;
        const riskLevel = hardWarnings >= 2 ? "高" : hardWarnings === 1 ? "中" : "低";
        const perScore = clip(scoreValueFactor(fundamentals.per, 8, 42) * 0.70 + heatScore * 0.30);
        const pbrScore = clip(scoreValueFactor(fundamentals.pbr, 0.8, 7.5) * 0.65 + dipScore * 0.35);
        const roeScore = clip(scoreValueFactor(fundamentals.roe, 28, 4, false) * 0.75 + stabilityScore * 0.25);
        const salesGrowthScore = clip(scoreValueFactor(fundamentals.sales_growth, 35, -8, false) * 0.70 + continuationScore * 0.30);
        const volumeCompositeScore = clip(volumeScore * 0.75 + fundamentals.liquidity_score * 0.25);
        const weights = state.coefficients;
        const totalWeight = Object.values(weights).reduce((sum, value) => sum + value, 0) || 1;
        let rawScore = (
          weights.per * perScore +
          weights.pbr * pbrScore +
          weights.roe * roeScore +
          weights.sales_growth * salesGrowthScore +
          weights.moving_average * trendScore +
          weights.volume * volumeCompositeScore +
          weights.momentum * momentumScore
        ) / totalWeight;
        if (state.universeMode !== "all" && Number.isFinite(item.universe_position) && Number.isFinite(item.universe_size)) {
          const positionRatio = item.universe_size > 1 ? item.universe_position / (item.universe_size - 1) : 0;
          const universeQualityScore = clip(1 - positionRatio * 2);
          rawScore = clip(rawScore * 0.68 + universeQualityScore * 0.32);
        }
        const k = { weekly: 2.2, monthly: 1.8, half_year: 1.4 }[state.periodType];
        const probability = 100 / (1 + Math.exp(-k * rawScore));
        const predictedReturn = probability / 100 * targetReturns[state.periodType];
        const grade = predictedReturn >= targetReturns[state.periodType] * 0.72 ? "強" : predictedReturn >= targetReturns[state.periodType] * 0.58 ? "中" : "弱";
        const actualReturn = evaluationClose && evaluationClose.length > 1 ? ((evaluationClose[evaluationClose.length - 1] / evaluationClose[0]) - 1) * 100 : null;
        const hitTarget = actualReturn != null ? actualReturn >= targetReturns[state.periodType] : false;
        const reasonScores = [
          ["PER", perScore],
          ["PBR", pbrScore],
          ["ROE", roeScore],
          ["売上成長", salesGrowthScore],
          ["トレンド", trendScore],
          ["出来高", volumeCompositeScore],
          ["勢い", momentumScore]
        ].map(([label, value]) => ({
          label,
          value: `${Math.round((Number(value) + 1) * 50)}点`,
          percent: Math.round((Number(value) + 1) * 50)
        }));
        return { symbol, name, score: rawScore, probability, predicted_return: predictedReturn, grade, actual_return: actualReturn, hit_target: hitTarget, relative_return: relativeReturn, risk_level: riskLevel, risk_warnings: riskWarnings, fundamentals, reasons: reasonScores };
      }

      async function screenWithBrowserData() {
        let rows;
        let scannedCount = 0;
        let totalCount = 0;
        let scopeLabel = state.market === "jp" ? "JPX普通株全体" : "米国株500銘柄";
        try {
          const localItems = await fetchLocalMarketData();
          totalCount = localItems.length;
          const scopedItems = getUniverseSlice(localItems);
          scannedCount = scopedItems.length;
          scopeLabel = getUniverseScopeLabel(totalCount, scannedCount);
          const benchmarkReturn = mean(scopedItems.map((item) => pctReturn(item.close || [], 21)));
          rows = scopedItems.map((item, index) => ({
            status: "fulfilled",
            value: scoreFromChart({ ...item, universe_position: index, universe_size: scopedItems.length, benchmark_return: benchmarkReturn })
          }));
        } catch {
          rows = await Promise.allSettled(fallbackUniverse[state.market].map(async ([symbol, name]) => {
            const chart = await fetchChart(symbol);
            return scoreFromChart({ symbol, name, close: chart.close, volume: chart.volume });
          }));
          scannedCount = fallbackUniverse[state.market].length;
          totalCount = scannedCount;
          scopeLabel = state.market === "jp" ? "予備データの日本株" : "予備データの米国株";
        }
        const sorted = rows.filter((row) => row.status === "fulfilled" && row.value).map((row) => row.value).filter((item) => !shouldExcludeByRisk(item)).sort((a, b) => b.predicted_return - a.predicted_return);
        const items = sorted.slice(0, 30).map((item, index) => ({ ...item, rank: index + 1 }));
        latestNearMisses = sorted.slice(30, 35);
        return { items, scannedCount, totalCount, scopeLabel };
      }

      function makePayload() {
        return { market: state.market, period_type: state.periodType, period_slot: state.periodSlot, coefficients: state.coefficients };
      }

      async function screenWithExternalApi(apiBaseUrl) {
        const response = await fetch(`${apiBaseUrl}/api/screen`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(makePayload()) });
        if (!response.ok) throw new Error(await response.text());
        const json = await response.json();
        const items = json.items.map((item) => ({
          ...item,
          grade: item.predicted_return >= targetReturns[state.periodType] * 0.72 ? "強" : item.predicted_return >= targetReturns[state.periodType] * 0.58 ? "中" : "弱",
          reasons: item.reasons || [{ label: "外部API", value: "-", percent: 50 }]
        }));
        return { items, scannedCount: json.scanned_count || items.length, totalCount: json.total_count || items.length, scopeLabel: "外部API" };
      }

      async function screen() {
        setMessage("株価データを読み込み中です...");
        try {
          const apiBaseUrl = getApiBaseUrl();
          const result = apiBaseUrl ? await screenWithExternalApi(apiBaseUrl) : await screenWithBrowserData();
          const items = result.items;
          if (!items.length) throw new Error("表示できる銘柄がありませんでした");
          renderRanking(items, result);
          saveHistory(result);
          const modeMessage = isValidationSlot()
            ? "過去検証です。当時の予測と、その後の実績を比較しています。"
            : "未来予測です。現在までのデータで次の期間の候補を出しています。";
          setMessage(`${result.scopeLabel}を評価対象にして、実際に${result.scannedCount}銘柄を計算しました。上位${items.length}銘柄を表示しています。${modeMessage} 銘柄をタップすると理由を確認できます。`);
        } catch (error) {
          setMessage(`取得に失敗しました: ${error.message || error}`);
        }
      }

      function backtest() {
        setMessage("過去期間を選ぶと検証モードになります。当時使えたデータだけでランキングを作り、その後の実績が目標を超えたかを表示します。週は+10%、月は+50%、半年は+300%が判定基準です。");
      }

      async function optimizeCoefficients() {
        setMessage("直近の過去期間で係数を検証しています...");
        const originalSlot = state.periodSlot;
        const originalCoefficients = { ...state.coefficients };
        const candidates = [
          { name: "標準", weights: defaultCoefficientPresets[state.periodType] },
          { name: "モメンタム重視", weights: { per: 0.05, pbr: 0.07, roe: 0.08, sales_growth: 0.12, moving_average: 0.26, volume: 0.18, momentum: 0.24 } },
          { name: "品質成長重視", weights: { per: 0.08, pbr: 0.08, roe: 0.22, sales_growth: 0.28, moving_average: 0.18, volume: 0.06, momentum: 0.10 } },
          { name: "割安反転重視", weights: { per: 0.20, pbr: 0.20, roe: 0.15, sales_growth: 0.12, moving_average: 0.14, volume: 0.09, momentum: 0.10 } }
        ];
        try {
          const localItems = await fetchLocalMarketData();
          const scopedItems = getUniverseSlice(localItems);
          const benchmarkReturn = mean(scopedItems.map((item) => pctReturn(item.close || [], 21)));
          state.periodSlot = "p1_to_now";
          let best = { name: "標準", weights: originalCoefficients, hitRate: -1, avgActual: -Infinity };
          candidates.forEach((candidate) => {
            state.coefficients = { ...candidate.weights };
            const scored = scopedItems.map((item, index) => scoreFromChart({ ...item, universe_position: index, universe_size: scopedItems.length, benchmark_return: benchmarkReturn })).filter(Boolean).sort((a, b) => b.predicted_return - a.predicted_return).slice(0, 30);
            const hitRate = scored.length ? scored.filter((item) => item.hit_target).length / scored.length : 0;
            const avgActual = mean(scored.map((item) => item.actual_return || 0));
            if (hitRate > best.hitRate || (hitRate === best.hitRate && avgActual > best.avgActual)) {
              best = { name: candidate.name, weights: candidate.weights, hitRate, avgActual };
            }
          });
          state.periodSlot = originalSlot;
          state.coefficients = { ...best.weights };
          renderSlots();
          renderSliders();
          renderTarget();
          clearRanking();
          setMessage(`${best.name}に係数を調整しました。直近検証のトップ30目標達成率は${Math.round(best.hitRate * 100)}%、平均実績は${best.avgActual.toFixed(1)}%です。`);
        } catch (error) {
          state.periodSlot = originalSlot;
          state.coefficients = originalCoefficients;
          renderSlots();
          renderSliders();
          renderTarget();
          setMessage(`係数最適化に失敗しました: ${error.message || error}`);
        }
      }

      async function runFullBacktest() {
        setMessage("複数の過去期間でバックテストしています...");
        const originalSlot = state.periodSlot;
        const panel = document.getElementById("backtestPanel");
        try {
          const localItems = await fetchLocalMarketData();
          const scopedItems = getUniverseSlice(localItems);
          const slots = periodSlots[state.periodType].filter(([slot]) => slot !== "current_to_next");
          const benchmarkReturn = mean(scopedItems.map((item) => pctReturn(item.close || [], 21)));
          const results = slots.map(([slot, label]) => {
            state.periodSlot = slot;
            const scored = scopedItems.map((item, index) => scoreFromChart({ ...item, universe_position: index, universe_size: scopedItems.length, benchmark_return: benchmarkReturn })).filter(Boolean).filter((item) => !shouldExcludeByRisk(item)).sort((a, b) => b.predicted_return - a.predicted_return).slice(0, 30);
            const hitCount = scored.filter((item) => item.hit_target).length;
            const avgActual = mean(scored.map((item) => item.actual_return || 0));
            const worst = Math.min(...scored.map((item) => item.actual_return || 0));
            return { label, hitCount, total: scored.length, avgActual, worst };
          });
          state.periodSlot = originalSlot;
          renderSlots();
          renderTarget();
          const totalHit = results.reduce((sum, item) => sum + item.hitCount, 0);
          const total = results.reduce((sum, item) => sum + item.total, 0);
          const avg = mean(results.map((item) => item.avgActual));
          panel.innerHTML = `<div class="section-title">本格バックテスト</div><div class="scope-summary">過去3期間をそれぞれ当時のデータだけでランキング化し、目標達成率・平均実績・最大悪化を集計しました。総合達成率 ${total ? Math.round(totalHit / total * 100) : 0}% / 平均実績 ${avg.toFixed(1)}%</div><div class="mini-list">${results.map((item) => `<div class="mini-item"><span>${item.label}<br>達成 ${item.hitCount}/${item.total} / 平均 ${item.avgActual.toFixed(1)}%</span><strong class="${item.worst < 0 ? "miss" : "hit"}">${item.worst.toFixed(1)}%</strong></div>`).join("")}</div>`;
          panel.classList.add("show");
          setMessage("バックテスト結果を表示しました。");
        } catch (error) {
          state.periodSlot = originalSlot;
          renderSlots();
          renderTarget();
          setMessage(`バックテストに失敗しました: ${error.message || error}`);
        }
      }

      function reset() {
        state.market = "jp";
        state.universeMode = "all";
        state.preset = "balanced";
        state.periodType = "weekly";
        state.periodSlot = "current_to_next";
        state.riskFilters = { excludeRisk: true, excludeIlliquid: true, excludeOverheated: false };
        state.coefficients = { ...defaultCoefficientPresets.weekly };
        syncButtons();
        renderSlots();
        renderSliders();
        renderTarget();
        renderRiskFilters();
        clearRanking();
      }

      function renderRiskFilters() {
        document.getElementById("excludeRiskInput").checked = state.riskFilters.excludeRisk;
        document.getElementById("excludeIlliquidInput").checked = state.riskFilters.excludeIlliquid;
        document.getElementById("excludeOverheatedInput").checked = state.riskFilters.excludeOverheated;
      }

      function bindRiskFilters() {
        const bindings = [
          ["excludeRiskInput", "excludeRisk"],
          ["excludeIlliquidInput", "excludeIlliquid"],
          ["excludeOverheatedInput", "excludeOverheated"]
        ];
        bindings.forEach(([id, key]) => {
          document.getElementById(id).addEventListener("change", (event) => {
            state.riskFilters[key] = event.target.checked;
            clearRanking();
          });
        });
      }

      function init() {
        document.querySelectorAll("[data-market]").forEach((button) => {
          button.addEventListener("click", () => {
            state.market = button.dataset.market;
            syncButtons();
            clearRanking();
          });
        });
        document.querySelectorAll("[data-universe]").forEach((button) => {
          button.addEventListener("click", () => {
            state.universeMode = button.dataset.universe;
            syncButtons();
            clearRanking();
          });
        });
        document.querySelectorAll("[data-preset]").forEach((button) => {
          button.addEventListener("click", () => {
            state.preset = button.dataset.preset;
            const preset = presetDefinitions[state.preset];
            if (preset?.market) state.market = preset.market;
            syncButtons();
            clearRanking();
            if (state.preset === "favorites" && favorites.size === 0) {
              setMessage("お気に入りはまだありません。銘柄カードを開いて登録できます。");
            }
          });
        });
        document.querySelectorAll("[data-period-type]").forEach((button) => {
          button.addEventListener("click", () => {
            state.periodType = button.dataset.periodType;
            state.periodSlot = "current_to_next";
            state.coefficients = { ...defaultCoefficientPresets[state.periodType] };
            syncButtons();
            renderSlots();
            renderSliders();
            renderTarget();
            clearRanking();
          });
        });
        document.getElementById("screenButton").addEventListener("click", screen);
        document.getElementById("backtestButton").addEventListener("click", backtest);
        document.getElementById("optimizeButton").addEventListener("click", optimizeCoefficients);
        document.getElementById("fullBacktestButton").addEventListener("click", runFullBacktest);
        document.getElementById("resetButton").addEventListener("click", reset);
        document.getElementById("historyButton").addEventListener("click", renderHistory);
        document.getElementById("clearHistoryButton").addEventListener("click", () => {
          localStorage.removeItem(HISTORY_STORAGE_KEY);
          document.getElementById("historyPanel").classList.remove("show");
          setMessage("履歴を削除しました。");
        });
        document.getElementById("toggleHelpButton").addEventListener("click", () => {
          showFactorHelp = !showFactorHelp;
          localStorage.setItem("showFactorHelp", String(showFactorHelp));
          renderSliders();
        });
        document.getElementById("saveApiButton").addEventListener("click", saveApiUrl);
        document.getElementById("apiBaseUrlInput").value = localStorage.getItem(API_URL_STORAGE_KEY) || "";
        bindRiskFilters();
        renderRiskFilters();
        renderSlots();
        renderSliders();
        renderTarget();
        if ("serviceWorker" in navigator) navigator.serviceWorker.register("./service-worker.js").catch(() => undefined);
      }

      init();
    </script>
  </body>
</html>
